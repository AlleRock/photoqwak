<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PhotoQwak</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PhotoQwak">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/AlleRock/photoqwak/main/icona.png">
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { 
            --primary: #007AFF; 
            --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text: #1d1d1f;
            --input-bg: rgba(255, 255, 255, 0.8);
            --danger: #ff3b30;
            --accent: #5856d6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #0a84ff;
                --bg: linear-gradient(135deg, #1c1c1e 0%, #000000 100%);
                --card-bg: rgba(44, 44, 46, 0.8);
                --text: #ffffff;
                --input-bg: rgba(58, 58, 60, 0.9);
                --danger: #ff453a;
                --accent: #5e5ce6;
            }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg);
            margin: 0; 
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(100px + env(safe-area-inset-bottom)) 20px; 
            min-height: 100vh;
            color: var(--text);
        }

        h1 { text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 20px; letter-spacing: -1px; }

        .header-controls {
            max-width: 600px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        input[type="text"] { 
            flex: 1; padding: 12px 18px; border-radius: 15px; border: none; 
            font-size: 16px; outline: none; background: var(--input-bg); color: var(--text);
        }

        .btn { 
            border: none; padding: 12px 20px; border-radius: 15px; font-weight: 700; 
            cursor: pointer; color: white; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
        .btn-add { background: var(--primary); }
        .btn-backup { background: var(--accent); flex: 1; font-size: 14px; }
        .btn-danger { background: var(--danger); }

        .folder-item {
            background: var(--card-bg);
            margin: 0 auto 15px auto;
            max-width: 600px;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .folder-info { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 12px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            max-width: 800px; 
            margin: 0 auto;
        }
        .grid img { 
            width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; 
            background: #333; cursor: pointer; 
        }

        .nav-bar {
            max-width: 800px; margin: 0 auto 20px auto;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* Viewer Ottimizzato */
        #viewer { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; 
        }
        #viewer img { max-width: 95%; max-height: 80%; border-radius: 10px; }

        .viewer-back-btn {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            left: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            z-index: 3001;
        }

        .footer { 
            position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--card-bg); 
            backdrop-filter: blur(25px); padding: 12px; display: flex; gap: 10px; 
            border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 100; 
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="view-list">
        <h1>PhotoQwak</h1>
        <div class="header-controls">
            <input type="text" id="folderName" placeholder="Nome cartella...">
            <button class="btn btn-add" onclick="createFolder()">Crea</button>
        </div>
        <div id="folder-list"></div>
    </div>

    <div id="view-folder" class="hidden">
        <div class="nav-bar">
            <button class="btn btn-add" onclick="showList()">← Indietro</button>
            <h2 id="current-folder-name" style="margin:0;"></h2>
            <button class="btn btn-add" onclick="document.getElementById('fileInput').click()">Aggiungi</button>
        </div>
        <div id="photo-grid" class="grid"></div>
    </div>

    <div id="viewer">
        <div class="viewer-back-btn" onclick="closeViewer()">✕</div>
        <img id="viewerImg" src="">
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn btn-add" id="shareBtn">Salva</button>
            <button class="btn btn-danger" id="deleteBtn">Elimina</button>
        </div>
    </div>

    <div class="footer">
        <button class="btn btn-backup" onclick="exportJSON()">Esporta JSON</button>
        <button class="btn btn-backup" onclick="document.getElementById('importFile').click()">Importa JSON</button>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importJSON(event)">

    <script>
        const db = new Dexie("PhotoQwakDB");
        db.version(1).stores({ folders: '++id, name', photos: '++id, folderId, data' });

        let currentFolderId = null;

        async function renderFolders() {
            const list = document.getElementById('folder-list');
            list.innerHTML = '';
            const folders = await db.folders.toArray();
            for (const f of folders) {
                const count = await db.photos.where('folderId').equals(f.id).count();
                const div = document.createElement('div');
                div.className = 'folder-item';
                div.onclick = () => openFolder(f.id, f.name);
                div.innerHTML = `
                    <div class="folder-info">📁 ${f.name} <span style="font-size:14px; opacity:0.6">(${count})</span></div>
                    <button class="btn btn-danger" style="padding:8px" onclick="event.stopPropagation(); deleteFolder(${f.id})">x</button>
                `;
                list.appendChild(div);
            }
        }

        async function createFolder() {
            const name = document.getElementById('folderName').value;
            if (name) {
                await db.folders.add({ name });
                document.getElementById('folderName').value = '';
                renderFolders();
            }
        }

        async function deleteFolder(id) {
            if(confirm("Eliminare cartella e foto?")) {
                await db.folders.delete(id);
                await db.photos.where('folderId').equals(id).delete();
                renderFolders();
            }
        }

        async function openFolder(id, name) {
            currentFolderId = id;
            document.getElementById('current-folder-name').innerText = name;
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-folder').classList.remove('hidden');
            renderPhotos();
        }

        function showList() {
            document.getElementById('view-list').classList.remove('hidden');
            document.getElementById('view-folder').classList.add('hidden');
            renderFolders();
        }

        async function renderPhotos() {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';
            const photos = await db.photos.where('folderId').equals(currentFolderId).toArray();
            photos.forEach(p => {
                const img = document.createElement('img');
                img.src = p.data;
                img.onclick = () => openViewer(p.data, p.id);
                grid.appendChild(img);
            });
        }

        document.getElementById('fileInput').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const data = await toBase64(file);
                await db.photos.add({ folderId: currentFolderId, data: data });
            }
            renderPhotos();
        };

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function openViewer(src, id) {
            document.getElementById('viewerImg').src = src;
            document.getElementById('viewer').style.display = 'flex';
            document.getElementById('shareBtn').onclick = (e) => {
                e.stopPropagation();
                const a = document.createElement('a'); a.href = src; a.download = "qwak_photo.jpg"; a.click();
            };
            document.getElementById('deleteBtn').onclick = async (e) => {
                e.stopPropagation();
                if(confirm("Elimina foto?")) { await db.photos.delete(id); closeViewer(); renderPhotos(); }
            };
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }

        async function exportJSON() {
            const data = { folders: await db.folders.toArray(), photos: await db.photos.toArray() };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "backup_photoqwak.json";
            a.click();
        }

        async function importJSON(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const data = JSON.parse(ev.target.result);
                for (const f of data.folders) {
                    const newId = await db.folders.add({ name: f.name });
                    const fPhotos = data.photos.filter(p => p.folderId === f.id);
                    for(const p of fPhotos) { await db.photos.add({ folderId: newId, data: p.data }); }
                }
                renderFolders();
            };
            reader.readAsText(file);
        }

        renderFolders();
    </script>
</body>
</html>
